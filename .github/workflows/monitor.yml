name: Monitor

# Vigilancia continua: corre health checks contra los targets de produccion y,
# si detecta caida, degradacion o lentitud fuera de lo normal, abre un GitHub Issue.
on:
  schedule:
    - cron: '0 */8 * * *' # cada 8 horas (00:00, 08:00, 16:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Instalar k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Health checks + alertas
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Marcas de staging a vigilar (nombres definidos en perf.config.json > targets.web).
          for brand in gfa roll-bits brasilia costaline rochoa conectagfa; do
            echo "== monitoreando web/$brand =="
            node bin/perf.js --tool k6 --platform web --type smoke --target "$brand" --notify || true
          done

      - name: Guardar historico
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git commit -m "monitor: health checks $(date -u +%Y-%m-%dT%H:%MZ)" || echo "sin cambios"
          git push || echo "no se pudo hacer push"
