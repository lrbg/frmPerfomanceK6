name: Suite de carga

# Corre varios tipos de prueba EN SECUENCIA contra un mismo target, en una sola
# ejecucion (load -> stress -> spike por defecto). Ideal para una campana de
# carga completa: un solo click, resultados en el historico y en Pages.
on:
  workflow_dispatch:
    inputs:
      target:
        description: Target (nombre de perf.config.json o URL completa)
        type: string
        default: demo
      platform:
        description: Plataforma
        type: choice
        options: [web, api]
        default: web
      types:
        description: Tipos en secuencia (separados por coma)
        type: string
        default: load,stress,spike

permissions:
  contents: write

jobs:
  suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Instalar k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Correr suite en secuencia
        run: |
          IFS=',' read -ra TYPES <<< "${{ inputs.types }}"
          for t in "${TYPES[@]}"; do
            t="$(echo "$t" | xargs)" # limpia espacios
            echo "::group::Prueba $t"
            node bin/perf.js --tool k6 --platform "${{ inputs.platform }}" --type "$t" --target "${{ inputs.target }}" || true
            echo "::endgroup::"
          done

      - name: Publicar reportes como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: suite-${{ inputs.platform }}
          path: reports/

      - name: Guardar historico en el repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git commit -m "suite: ${{ inputs.types }} sobre ${{ inputs.target }}" || echo "sin cambios"
          git pull --rebase origin main || true
          git push || echo "no se pudo hacer push"
